services:
  marklogic:
    # ── IMAGE FIX ───────────────────────────────────────────────────────────
    # Old broken tags: 11.2.0-ubi9 and 11.3.1-ubi9-2.2.3 (no longer exist)
    # That tag no longer exists on Docker Hub as of 2026.
    # New tag format:   {ML version}-{OS}-{docker-image version}
    # Confirmed working tag — verified live on Docker Hub March 2026
    # ────────────────────────────────────────────────────────────────────────
    image: progressofficial/marklogic-db:11.3.3-ubi-2.2.2@sha256:27fafe66b799de635897e2d287d267d44a7b901d9ab2004b05375e8688e8f285
    container_name: ml
    hostname: ml
    ports:
      - "8000:8000"   # App Services / XDBC
      - "8001:8001"   # Admin UI
      - "8002:8002"   # Manage API
      - "8040:8040"   # MECP REST Server
      - "8041:8041"   # MECP REST Server (alternate)
    environment:
      MARKLOGIC_INIT: "true"
      MARKLOGIC_ADMIN_USERNAME: admin
      MARKLOGIC_ADMIN_PASSWORD: admin123
    volumes:
      - ml-data:/var/opt/MarkLogic
    # ── Health check ────────────────────────────────────────────────────────
    # Prevents roxy from starting before MarkLogic is fully initialized.
    # MarkLogic takes 60-90 seconds to start on first run.
    healthcheck:
      test: ["CMD", "curl", "-sf", "--digest", "-u", "admin:admin123", "http://localhost:8002/manage/v2?view=status&format=json"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s

  roxy:
    build:
      context: ./roxy
    working_dir: /work/claims-roxy
    volumes:
      - ./:/work
    depends_on:
      marklogic:
        condition: service_healthy   # waits for health check above
    environment:
      ML_HOST: ml
      ML_USERNAME: admin
      ML_PASSWORD: admin123

volumes:
  ml-data: