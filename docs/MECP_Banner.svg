<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2144"/>
    </linearGradient>
    <linearGradient id="capbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2035"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="10"/>

  <!-- Subtle grid dots -->
  <circle cx="20" cy="20" r="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="50" cy="20" r="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="80" cy="20" r="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="20" cy="50" r="1.5" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="50" cy="50" r="1.5" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="80" cy="50" r="1.5" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="20" cy="80" r="1.5" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="50" cy="80" r="1.5" fill="#ffffff" fill-opacity="0.05"/>

  <!-- Divider between pipeline and capabilities -->
  <line x1="870" y1="16" x2="870" y2="304" stroke="#1e3a5a" stroke-width="1"/>

  <!-- Capabilities panel background -->
  <rect x="876" y="16" width="308" height="288" rx="6" fill="url(#capbg)" fill-opacity="0.6"/>

  <!-- ─── HEADER ─── -->
  <!-- MECP badge -->
  <rect x="20" y="18" width="58" height="28" rx="5" fill="#00c9b1"/>
  <text x="49" y="37" font-family="Arial" font-size="12" font-weight="700"
        fill="#003d35" text-anchor="middle" letter-spacing="1.5">MECP</text>

  <!-- Title -->
  <text x="88" y="32" font-family="Arial" font-size="22" font-weight="700"
        fill="#ffffff" letter-spacing="0.3">MarkLogic Enterprise Claims Platform</text>

  <!-- Subtitle -->
  <text x="88" y="52" font-family="Arial" font-size="11" fill="#7ab8e8" letter-spacing="0.3">
    Real-time healthcare claims processing, search, and analytics architecture
  </text>

  <!-- ─── PIPELINE ROW 1 ─── -->
  <!-- Card 1 - Claims Sources -->
  <rect x="20" y="72" width="138" height="88" rx="7"
        fill="#162840" stroke="#1e3a5a" stroke-width="1"/>
  <!-- Icon - document lines -->
  <rect x="49" y="84" width="22" height="3" rx="1.5" fill="#00c9b1" fill-opacity="0.8"/>
  <rect x="49" y="91" width="18" height="3" rx="1.5" fill="#00c9b1" fill-opacity="0.6"/>
  <rect x="49" y="98" width="20" height="3" rx="1.5" fill="#00c9b1" fill-opacity="0.4"/>
  <text x="89" y="95" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">Claims Sources</text>
  <text x="89" y="110" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">JSON claim files</text>
  <text x="89" y="123" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">sample datasets</text>
  <text x="89" y="152" font-family="Arial" font-size="9" fill="#4a7fa8" text-anchor="middle">SOURCE</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="116" x2="182" y2="116" stroke="#00c9b1" stroke-width="1.5"/>
  <polygon points="182,111 192,116 182,121" fill="#00c9b1"/>

  <!-- Card 2 - Ingestion Layer -->
  <rect x="196" y="72" width="138" height="88" rx="7"
        fill="#162840" stroke="#1e3a5a" stroke-width="1"/>
  <!-- Icon - down arrow into db -->
  <line x1="265" y1="84" x2="265" y2="96" stroke="#00c9b1" stroke-width="2"/>
  <polygon points="260,93 265,100 270,93" fill="#00c9b1"/>
  <ellipse cx="265" cy="103" rx="12" ry="4" fill="none" stroke="#00c9b1" stroke-width="1.5"/>
  <text x="265" y="121" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">Ingestion Layer</text>
  <text x="265" y="136" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">MLCP bulk load</text>
  <text x="265" y="149" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">repeatable import jobs</text>
  <text x="265" y="152" font-family="Arial" font-size="9" fill="#4a7fa8" text-anchor="middle"> </text>

  <!-- Arrow 2 -->
  <line x1="338" y1="116" x2="358" y2="116" stroke="#00c9b1" stroke-width="1.5"/>
  <polygon points="358,111 368,116 358,121" fill="#00c9b1"/>

  <!-- Card 3 - Processing Layer -->
  <rect x="372" y="72" width="138" height="88" rx="7"
        fill="#162840" stroke="#1e3a5a" stroke-width="1"/>
  <!-- Icon - wave/transform -->
  <path d="M 421 92 Q 431 84 441 92 Q 451 100 461 92"
        fill="none" stroke="#00c9b1" stroke-width="2" stroke-linecap="round"/>
  <text x="441" y="118" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">Processing Layer</text>
  <text x="441" y="133" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">CORB pipeline steps</text>
  <text x="441" y="146" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">validation and enrichment</text>

  <!-- Arrow 3 -->
  <line x1="514" y1="116" x2="534" y2="116" stroke="#00c9b1" stroke-width="1.5"/>
  <polygon points="534,111 544,116 534,121" fill="#00c9b1"/>

  <!-- Card 4 - MarkLogic Database -->
  <rect x="548" y="72" width="138" height="88" rx="7"
        fill="#162840" stroke="#1e3a5a" stroke-width="1"/>
  <!-- Icon - cylinder/db -->
  <ellipse cx="617" cy="93" rx="16" ry="5" fill="none" stroke="#00c9b1" stroke-width="1.5"/>
  <line x1="601" y1="93" x2="601" y2="106" stroke="#00c9b1" stroke-width="1.5"/>
  <line x1="633" y1="93" x2="633" y2="106" stroke="#00c9b1" stroke-width="1.5"/>
  <ellipse cx="617" cy="106" rx="16" ry="5" fill="#162840" stroke="#00c9b1" stroke-width="1.5"/>
  <text x="617" y="124" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">MarkLogic DB</text>
  <text x="617" y="139" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">indexed NoSQL storage</text>
  <text x="617" y="152" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">8000 RDF triples</text>

  <!-- Arrow 4 -->
  <line x1="690" y1="116" x2="710" y2="116" stroke="#00c9b1" stroke-width="1.5"/>
  <polygon points="710,111 720,116 710,121" fill="#00c9b1"/>

  <!-- Card 5 - API Layer -->
  <rect x="724" y="72" width="138" height="88" rx="7"
        fill="#162840" stroke="#1e3a5a" stroke-width="1"/>
  <!-- Icon - code brackets -->
  <text x="793" y="106" font-family="Arial" font-size="18" font-weight="700"
        fill="#00c9b1" text-anchor="middle">&lt;/&gt;</text>
  <text x="793" y="124" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">API Layer</text>
  <text x="793" y="139" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">REST resources</text>
  <text x="793" y="152" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">XQuery extensions</text>

  <!-- ─── PIPELINE ROW 2 (Consumers + caption) ─── -->
  <!-- Down arrow from API to Consumers -->
  <line x1="793" y1="164" x2="793" y2="184" stroke="#00c9b1" stroke-width="1.5"/>
  <polygon points="788,181 793,191 798,181" fill="#00c9b1"/>

  <!-- Card 6 - Consumers -->
  <rect x="724" y="194" width="138" height="88" rx="7"
        fill="#162840" stroke="#00c9b1" stroke-width="1.5"/>
  <!-- Icon - screen/dashboard -->
  <rect x="775" y="204" width="36" height="24" rx="3"
        fill="none" stroke="#00c9b1" stroke-width="1.5"/>
  <line x1="793" y1="228" x2="793" y2="234" stroke="#00c9b1" stroke-width="1.5"/>
  <line x1="785" y1="234" x2="801" y2="234" stroke="#00c9b1" stroke-width="1.5"/>
  <text x="793" y="252" font-family="Arial" font-size="11" font-weight="700"
        fill="#ffffff" text-anchor="middle">Consumers</text>
  <text x="793" y="267" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">dashboards</text>
  <text x="793" y="280" font-family="Arial" font-size="9" fill="#6b8fa8" text-anchor="middle">reporting and BI</text>

  <!-- ─── ENTERPRISE CAPABILITIES PANEL ─── -->
  <text x="1030" y="38" font-family="Arial" font-size="11" font-weight="700"
        fill="#7ab8e8" text-anchor="middle" letter-spacing="1.5">ENTERPRISE CAPABILITIES</text>
  <line x1="886" y1="46" x2="1174" y2="46" stroke="#1e3a5a" stroke-width="1"/>

  <!-- Capability items -->
  <circle cx="898" cy="68" r="5" fill="#00c9b1"/>
  <text x="910" y="72" font-family="Arial" font-size="11" fill="#c8dff0">Batch ingestion with MLCP</text>

  <circle cx="898" cy="96" r="5" fill="#00c9b1"/>
  <text x="910" y="100" font-family="Arial" font-size="11" fill="#c8dff0">Pipeline orchestration with CORB</text>

  <circle cx="898" cy="124" r="5" fill="#00c9b1"/>
  <text x="910" y="128" font-family="Arial" font-size="11" fill="#c8dff0">Indexed NoSQL claim storage</text>

  <circle cx="898" cy="152" r="5" fill="#00c9b1"/>
  <text x="910" y="156" font-family="Arial" font-size="11" fill="#c8dff0">REST resources for app access</text>

  <circle cx="898" cy="180" r="5" fill="#00c9b1"/>
  <text x="910" y="184" font-family="Arial" font-size="11" fill="#c8dff0">Analytics ready for BI reporting</text>

  <circle cx="898" cy="208" r="5" fill="#00c9b1"/>
  <text x="910" y="212" font-family="Arial" font-size="11" fill="#c8dff0">Docker based developer deployment</text>

  <circle cx="898" cy="236" r="5" fill="#00c9b1"/>
  <text x="910" y="240" font-family="Arial" font-size="11" fill="#c8dff0">Semantic triples with SPARQL</text>

  <circle cx="898" cy="264" r="5" fill="#00c9b1"/>
  <text x="910" y="268" font-family="Arial" font-size="11" fill="#c8dff0">6/6 verification tests passing</text>

  <!-- Platform focus line -->
  <line x1="886" y1="280" x2="1174" y2="280" stroke="#1e3a5a" stroke-width="1"/>
  <text x="1030" y="296" font-family="Arial" font-size="9" fill="#3a6080"
        text-anchor="middle">Platform focus: operational clarity, fast onboarding, and demo-ready delivery</text>

  <!-- ─── BOTTOM CAPTION ─── -->
  <line x1="20" y1="304" x2="858" y2="304" stroke="#1e3a5a" stroke-width="1"/>
  <text x="439" y="316" font-family="Arial" font-size="9" fill="#3a6080" text-anchor="middle">
    Enterprise flow: source data → ingestion → processing → indexed storage → API access → analytics consumption
  </text>
</svg>
